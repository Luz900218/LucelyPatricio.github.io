<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="logo" id="navLogo">ML<span>PG</span></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#education">Education</a></li>
        </ul>
        <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1 id="heroName"></h1>
            <p class="subtitle" id="heroSubtitle"></p>
            <div class="contact-links" id="heroLinks"></div>
            <div class="stats" id="heroStats"></div>
        </div>
    </section>

    <section id="about">
        <div class="section-title"><h2>About Me</h2><div class="underline"></div></div>
        <p class="about-content fade-in" id="aboutText"></p>
    </section>

    <section id="projects">
        <div class="section-title"><h2>Featured Projects</h2><div class="underline"></div></div>
        <div class="project-tabs" id="projectTabs"></div>
        <div class="projects-grid" id="projectsGrid"></div>
    </section>

    <section id="skills">
        <div class="section-title"><h2>Technical Skills</h2><div class="underline"></div></div>
        <div class="skill-tabs" id="skillTabs"></div>
        <div class="skills-grid" id="skillsGrid"></div>
    </section>

    <section id="education">
        <div class="section-title"><h2>Education &amp; Certifications</h2><div class="underline"></div></div>
        <div class="edu-certs-grid">
            <div class="edu-card fade-in" id="eduContainer"><h3>Education</h3></div>
            <div class="cert-card fade-in" id="certContainer"><h3>Certifications</h3></div>
        </div>
        <div class="languages" id="langContainer"></div>
    </section>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lbClose">X</button>
        <button class="lightbox-nav lb-prev" id="lbPrev">&#8249;</button>
        <img id="lbImg" src="" alt="">
        <button class="lightbox-nav lb-next" id="lbNext">&#8250;</button>
        <div class="lightbox-counter" id="lbCounter"></div>
        <div class="lightbox-info">
            <span class="lb-company" id="lbCompany"></span>
            <span class="lb-title" id="lbTitle"></span>
        </div>
    </div>

    <footer>
        <div class="footer-links" id="footerLinks"></div>
        <p id="footerCopy"></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
